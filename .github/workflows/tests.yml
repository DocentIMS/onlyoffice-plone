name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            tox-env: py310-plone62
          - python-version: "3.11"
            tox-env: py311-plone62
          - python-version: "3.12"
            tox-env: py312-plone62
          - python-version: "3.13"
            tox-env: py313-plone62
          - python-version: "3.10"
            tox-env: py310-plone61
          - python-version: "3.11"
            tox-env: py311-plone61
          - python-version: "3.12"
            tox-env: py312-plone61
          - python-version: "3.13"
            tox-env: py313-plone61

    name: ${{ matrix.tox-env }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tox
        run: pip install tox

      - name: Run tests
        run: tox -e ${{ matrix.tox-env }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tox
        run: pip install tox

      - name: Run coverage
        run: tox -e coverage

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
